services:
  maven:
    image: ${MAVEN_IMAGE:-maven:3.9.16-eclipse-temurin-25}
    working_dir: /workspace
    volumes:
      - .:/workspace
      - maven-repository:/root/.m2
    environment:
      MAVEN_OPTS: ${MAVEN_OPTS:-}
      SREADER_JOOQ_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sreader}
      SREADER_JOOQ_JDBC_USERNAME: ${POSTGRES_USER:-sreader}
      SREADER_JOOQ_JDBC_PASSWORD: ${POSTGRES_PASSWORD:-sreader}
      SREADER_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_TEST_DB:-sreadertest}
      SREADER_DATASOURCE_USERNAME: ${POSTGRES_TEST_USER:-sreadertest}
      SREADER_DATASOURCE_PASSWORD: ${POSTGRES_TEST_PASSWORD:-sreadertest}
      SREADER_SCHEDULER_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    environment:
      SREADER_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sreader}
      SREADER_DATASOURCE_USERNAME: ${POSTGRES_USER:-sreader}
      SREADER_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-sreader}
      SREADER_SCHEDULER_ENABLED: ${SREADER_SCHEDULER_ENABLED:-true}
      SREADER_SCHEDULER_CRON: ${SREADER_SCHEDULER_CRON:-0 */15 * * * *}
      SREADER_HTTP_USER_AGENT: ${SREADER_HTTP_USER_AGENT:-SReader/0.1}
      SREADER_PLAYWRIGHT_ENABLED: ${SREADER_PLAYWRIGHT_ENABLED:-false}
      SREADER_PLAYWRIGHT_HEADLESS: ${SREADER_PLAYWRIGHT_HEADLESS:-true}
      SREADER_PLAYWRIGHT_INFY_EXTENSION_DIR: ${SREADER_PLAYWRIGHT_INFY_EXTENSION_DIR:-}
      SREADER_PLAYWRIGHT_INFY_USER_DATA_DIR: ${SREADER_PLAYWRIGHT_INFY_USER_DATA_DIR:-}
      SREADER_PLAYWRIGHT_INFY_MAX_SCROLLS: ${SREADER_PLAYWRIGHT_INFY_MAX_SCROLLS:-20}
      SREADER_PLAYWRIGHT_INFY_STABLE_ROUNDS: ${SREADER_PLAYWRIGHT_INFY_STABLE_ROUNDS:-3}
      SREADER_PLAYWRIGHT_INFY_SCROLL_WAIT: ${SREADER_PLAYWRIGHT_INFY_SCROLL_WAIT:-2700ms}
      SREADER_SEED_FEED_URLS: ${SREADER_SEED_FEED_URLS:-}
      SREADER_TEXT_EXPORT_ENABLED: ${SREADER_TEXT_EXPORT_ENABLED:-false}
      SREADER_TEXT_EXPORT_OUTPUT_DIR: /var/lib/sreader/content-text
      SREADER_TEXT_EXPORT_BATCH_SIZE: ${SREADER_TEXT_EXPORT_BATCH_SIZE:-100}
    volumes:
      - ${SREADER_TEXT_EXPORT_HOST_DIR:-./var/sreader/content-text}:/var/lib/sreader/content-text
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:18.4}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sreader}
      POSTGRES_USER: ${POSTGRES_USER:-sreader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sreader}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sreader} -d ${POSTGRES_DB:-sreader}"]
      interval: 5s
      timeout: 5s
      retries: 12

  flyway:
    image: ${FLYWAY_IMAGE:-redgate/flyway:12.9.0}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/migration:/flyway/migrations:ro
    environment:
      FLYWAY_URL: "jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sreader}"
      FLYWAY_USER: ${POSTGRES_USER:-sreader}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-sreader}
      FLYWAY_LOCATIONS: filesystem:/flyway/migrations

volumes:
  maven-repository:
  postgres-data:
