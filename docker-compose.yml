services:
  maven:
    image: ${MAVEN_IMAGE:-maven:3.9-eclipse-temurin-17}
    working_dir: /workspace
    volumes:
      - .:/workspace
      - maven-repository:/root/.m2
    environment:
      MAVEN_OPTS: ${MAVEN_OPTS:-}
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.4}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-sreaderroot}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sreader}
      MYSQL_USER: ${MYSQL_USER:-sreader}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sreader}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  flyway:
    image: ${FLYWAY_IMAGE:-redgate/flyway:12.8.1}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./db/migration:/flyway/migrations:ro
    environment:
      FLYWAY_URL: "jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-sreader}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC"
      FLYWAY_USER: ${MYSQL_USER:-sreader}
      FLYWAY_PASSWORD: ${MYSQL_PASSWORD:-sreader}
      FLYWAY_LOCATIONS: filesystem:/flyway/migrations

volumes:
  maven-repository:
  mysql-data:
