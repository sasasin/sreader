spring:
  application:
    name: sreader
  datasource:
    url: ${SREADER_DATASOURCE_URL:jdbc:postgresql://postgres:5432/sreader}
    username: ${SREADER_DATASOURCE_USERNAME:sreader}
    password: ${SREADER_DATASOURCE_PASSWORD:sreader}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jooq:
    sql-dialect: postgres

management:
  endpoints:
    web:
      exposure:
        include: health,info

sreader:
  scheduler:
    enabled: ${SREADER_SCHEDULER_ENABLED:true}
    cron: ${SREADER_SCHEDULER_CRON:0 */15 * * * *}
  job:
    run-once: ${SREADER_JOB_RUN_ONCE:false}
  http:
    user-agent: ${SREADER_HTTP_USER_AGENT:SReader/0.1}
    connect-timeout: ${SREADER_HTTP_CONNECT_TIMEOUT:5s}
    read-timeout: ${SREADER_HTTP_READ_TIMEOUT:20s}
    retry-count: ${SREADER_HTTP_RETRY_COUNT:1}
  playwright:
    enabled: ${SREADER_PLAYWRIGHT_ENABLED:false}
    headless: ${SREADER_PLAYWRIGHT_HEADLESS:true}
    viewport-width: ${SREADER_PLAYWRIGHT_VIEWPORT_WIDTH:1280}
    viewport-height: ${SREADER_PLAYWRIGHT_VIEWPORT_HEIGHT:1600}
    navigation-timeout: ${SREADER_PLAYWRIGHT_NAVIGATION_TIMEOUT:60s}
    network-idle-timeout: ${SREADER_PLAYWRIGHT_NETWORK_IDLE_TIMEOUT:5s}
    infy-extension-dir: ${SREADER_PLAYWRIGHT_INFY_EXTENSION_DIR:}
    infy-user-data-dir: ${SREADER_PLAYWRIGHT_INFY_USER_DATA_DIR:}
    infy-max-scrolls: ${SREADER_PLAYWRIGHT_INFY_MAX_SCROLLS:20}
    infy-stable-rounds: ${SREADER_PLAYWRIGHT_INFY_STABLE_ROUNDS:3}
    infy-scroll-wait: ${SREADER_PLAYWRIGHT_INFY_SCROLL_WAIT:2700ms}
  text-export:
    enabled: ${SREADER_TEXT_EXPORT_ENABLED:false}
    output-dir: ${SREADER_TEXT_EXPORT_OUTPUT_DIR:/var/lib/sreader/content-text}
    batch-size: ${SREADER_TEXT_EXPORT_BATCH_SIZE:100}
  seed-feed-urls: ${SREADER_SEED_FEED_URLS:}
