apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - postgres-service.yaml
  - postgres-statefulset.yaml
  - content-text-pvc.yaml

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  - name: sreader-db-secret
    namespace: sreader
    literals:
      - SREADER_DATASOURCE_USERNAME=sreader
      - SREADER_DATASOURCE_PASSWORD=sreader