apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: sreader
  labels:
    app.kubernetes.io/name: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18.4
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: sreader
            - name: POSTGRES_USER
              value: sreader
            - name: POSTGRES_PASSWORD
              value: sreader
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - sreader
                - -d
                - sreader
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi