apiVersion: v1
kind: PersistentVolume
metadata:
  name: sreader-content-text-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: sreader-hostpath
  hostPath:
    path: /srv/sreader/content-text
    type: DirectoryOrCreate
