apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: postgres-host
  namespace: sreader
  labels:
    kubernetes.io/service-name: postgres
    endpointslice.kubernetes.io/managed-by: manual
addressType: IPv4
ports:
  - name: postgres
    protocol: TCP
    port: 5432
endpoints:
  - addresses:
      - "192.168.1.10"