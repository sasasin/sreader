name: Kubernetes manifests

on:
  pull_request:
    paths: ['k8s/**', 'scripts/k8s/**', 'renovate.json', '.github/workflows/kubernetes-manifests.yml', 'AGENTS.md', 'README.md']
  push:
    branches: [master]
    paths: ['k8s/**', 'scripts/k8s/**', 'renovate.json', '.github/workflows/kubernetes-manifests.yml', 'AGENTS.md', 'README.md']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kubernetes-manifests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-validation:
    name: Kubernetes manifest static validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Validate scripts and version policy
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          scripts/k8s/test-scripts.sh
          if [[ "${{ github.event_name }}" == pull_request ]]; then
            base_file="$(mktemp)"
            trap 'rm -f "$base_file"' EXIT
            if git show "origin/${{ github.base_ref }}:k8s/ops/versions.env" > "$base_file" 2>/dev/null; then
              scripts/k8s/check-upgrade-step.sh k8s/ops/versions.env "$base_file"
            else
              scripts/k8s/check-upgrade-step.sh k8s/ops/versions.env
            fi
          else
            scripts/k8s/check-upgrade-step.sh k8s/ops/versions.env
          fi
      - name: Install pinned Kubernetes CI tools
        run: scripts/k8s/install-ci-tools.sh
      - name: Render and statically validate manifests
        run: scripts/k8s/validate-static.sh
  target-k3s-validation:
    name: Kubernetes manifest target k3s validation
    needs: static-validation
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Validate version files
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: scripts/k8s/test-scripts.sh
      - name: Install pinned Kubernetes CI tools
        run: scripts/k8s/install-ci-tools.sh
      - name: Validate manifests against target k3s API server
        run: scripts/k8s/validate-target-k3s.sh
